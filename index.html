<!DOCTYPE html>
<html>
<head>
    <title>Simple Store</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .product {
            border: 1px solid #ccc;
            padding: 15px;
            margin: 15px;
            background: white;
            width: 200px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        button {
            padding: 8px 12px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background-color: darkgreen;
        }

        .cart {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>🛒 My Store</h1>

<div class="container">

    <div class="product">
        <h3>Product 1</h3>
        <p>₹500</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Product 2</h3>
        <p>₹800</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Product 3</h3>
        <p>₹1200</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

</div>

<div class="cart">
    🛍 Cart Items: <span id="cart">0</span>
</div>

<script>
    let count = 0;

    function addToCart() {
        count++;
        document.getElementById("cart").innerText = count;
    }
</script>

</body>
</html>
